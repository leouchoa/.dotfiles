# config custom filepath
# https://unix.stackexchange.com/a/644824

set -g default-terminal "screen-256color"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r m resize-pane -Z
# forget the find window.  That is for chumps
# bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"


# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'
# for more config options: https://draculatheme.com/tmux
# set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# dracula config options
set -g @dracula-show-powerline true
set -g @dracula-show-fahrenheit false
set -g @dracula-fixed-location "Sao_Paulo"
set -g @dracula-plugins "weather"
set -g @dracula-show-flags true
set -g status-position top
# set -g @dracula-show-left-icon true


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# !!!!!!!!!!!!!!!!! config instructions !!!!!!!!!!!!!!!!!
# 1. run `git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm`
# 2. reload tmux and run `C-prefix shift-i`
#
# note that this config does not point to the default `.tmux` dir. It points to 
# `~/.config/tmux/plugins/...`

run '~/.config/tmux/plugins/tpm/tpm'
